<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud File Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f2937, #0f172a);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 80px rgba(15, 23, 42, 0.35);
    }
    .title {
      text-align: center;
      margin-bottom: 24px;
    }
    .title h1 {
      font-size: 2rem;
      letter-spacing: -0.04em;
    }
    .title p {
      color: #94a3b8;
      margin-top: 10px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    select,
    input[type="file"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.85);
      color: #e2e8f0;
      font-size: 0.95rem;
      margin-bottom: 20px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.65; cursor: not-allowed; }
    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      font-size: 0.95rem;
    }
    .message.error {
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }
    .message.success {
      background: rgba(52, 211, 153, 0.12);
      color: #a7f3d0;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      background: rgba(15, 23, 42, 0.75);
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      display: none;
      text-align: center;
    }
    .result a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      padding: 12px 24px;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
    .loader {
      display: none;
      margin-top: 18px;
      text-align: center;
      color: #94a3b8;
    }
    .loader span {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border: 3px solid rgba(148, 163, 184, 0.3);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer {
      margin-top: 24px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">
      <h1>☁️ Cloud File Converter</h1>
      <p>Upload your file and get a download link instantly.</p>
    </div>

    <form id="converterForm">
      <label for="conversion">Conversion Type</label>
      <select id="conversion" name="conversion" required>
        <option value="">-- Choose conversion --</option>
        <option value="pdf_to_word">PDF → Word</option>
        <option value="word_to_pdf">Word → PDF</option>
        <option value="ppt_to_pdf">PPT → PDF</option>
        <option value="image_to_pdf">Image → PDF</option>
        <option value="jpg_to_png">JPG → PNG</option>
        <option value="png_to_jpg">PNG → JPG</option>
      </select>

      <label for="file">Upload File</label>
      <input type="file" id="file" name="file" required />

      <button type="submit" id="convertBtn">⚡ Convert</button>
    </form>

    <div class="loader" id="loader">
      <span></span> Converting your file, please wait...
    </div>

    <div class="message error" id="errorBox"></div>

    <div class="result" id="resultBox">
      <div>✅ Conversion completed!</div>
      <a id="downloadLink" href="#">Download Converted File</a>
    </div>

    <div class="footer">Only the converted file is kept temporarily for download.</div>
  </div>

  <script>
    const form = document.getElementById('converterForm');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('errorBox');
    const resultBox = document.getElementById('resultBox');
    const downloadLink = document.getElementById('downloadLink');
    const submitButton = document.getElementById('convertBtn');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      errorBox.style.display = 'none';
      resultBox.style.display = 'none';

      const fileInput = document.getElementById('file');
      const conversion = document.getElementById('conversion').value;

      if (!conversion) {
        return showError('Please select a conversion type.');
      }
      if (!fileInput.files.length) {
        return showError('Please choose a file to convert.');
      }

      loader.style.display = 'block';
      submitButton.disabled = true;

      const formData = new FormData();
      formData.append('conversion', conversion);
      formData.append('file', fileInput.files[0]);

      try {
        const response = await fetch('/convert', {
          method: 'POST',
          body: formData,
        });
        const data = await response.json();
        loader.style.display = 'none';
        submitButton.disabled = false;

        if (!data.success) {
          return showError(data.error || 'Conversion failed.');
        }

        downloadLink.href = data.download_url;
        downloadLink.textContent = `⬇️ Download ${data.filename}`;
        resultBox.style.display = 'block';
      } catch (error) {
        loader.style.display = 'none';
        submitButton.disabled = false;
        showError('Something went wrong. Please try again.');
      }
    });

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
